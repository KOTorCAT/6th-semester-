<!DOCTYPE html>
<html>
<head>
    <title>Notes | Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            color: #111111;
            line-height: 1.5;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        
        h1 {
            font-size: 28px;
            font-weight: 500;
            letter-spacing: -0.3px;
            border-bottom: 2px solid #111111;
            padding-bottom: 12px;
            margin-bottom: 24px;
        }
        
        .btn {
            display: inline-block;
            background-color: #111111;
            color: #ffffff;
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s ease;
            font-family: inherit;
        }
        
        .btn:hover {
            background-color: #333333;
        }
        
        .btn-outline {
            background-color: transparent;
            color: #111111;
            border: 1px solid #111111;
        }
        
        .btn-outline:hover {
            background-color: #111111;
            color: #ffffff;
        }
        
        .btn-danger {
            background-color: transparent;
            color: #111111;
            border: 1px solid #111111;
        }
        
        .btn-danger:hover {
            background-color: #111111;
            color: #ffffff;
        }
        
        .btn-sm {
            padding: 6px 14px;
            font-size: 13px;
        }
        
        .add-btn {
            margin-bottom: 30px;
        }
        
        .note {
            border: 1px solid #cccccc;
            padding: 20px;
            margin-bottom: 16px;
            background-color: #ffffff;
            transition: border-color 0.2s ease;
        }
        
        .note:hover {
            border-color: #111111;
        }
        
        .note.done {
            background-color: #f5f5f5;
            border-color: #aaaaaa;
        }
        
        .note.done h3 {
            text-decoration: line-through;
            color: #666666;
        }
        
        .note-title {
            font-size: 20px;
            font-weight: 500;
            margin-bottom: 10px;
            letter-spacing: -0.2px;
        }
        
        .note-text {
            color: #333333;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        
        .note-meta {
            font-size: 12px;
            color: #888888;
            margin-bottom: 16px;
            font-family: monospace;
        }
        
        .note-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #888888;
            border: 1px solid #eeeeee;
            background-color: #fafafa;
        }
        
        .empty-state p {
            margin-bottom: 20px;
        }
        
        hr {
            border: none;
            border-top: 1px solid #eeeeee;
            margin: 30px 0;
        }
        
        footer {
            text-align: center;
            font-size: 12px;
            color: #999999;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #eeeeee;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NOTES</h1>
        
        <div class="add-btn">
            <a href="/add/"><button class="btn">+ New Note</button></a>
        </div>
        
        {% for note in notes %}
            <div class="note {% if note.is_done %}done{% endif %}">
                <div class="note-title">{{ note.title }}</div>
                <div class="note-text">{{ note.text|linebreaksbr }}</div>
                <div class="note-meta">{{ note.created_date|date:"Y-m-d H:i" }}</div>
                <div class="note-actions">
                    <a href="/edit/{{ note.id }}/"><button class="btn btn-sm btn-outline">Edit</button></a>
                    <a href="/delete/{{ note.id }}/"><button class="btn btn-sm btn-danger">Delete</button></a>
                    <a href="/toggle/{{ note.id }}/"><button class="btn btn-sm btn-outline">{% if note.is_done %}Mark Undone{% else %}Mark Done{% endif %}</button></a>
                </div>
            </div>
        {% empty %}
            <div class="empty-state">
                <p>No notes yet.</p>
                <a href="/add/"><button class="btn">Create your first note</button></a>
            </div>
        {% endfor %}
        
        <footer>
            Notes — simple note taking application
        </footer>
    </div>
</body>
</html>
